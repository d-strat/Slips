x-peer: &default-peer
  build:
    context: ./iris
    dockerfile: ./Dockerfile
  environment:
    - GOLOG_LOG_LEVEL=iris=debug
  command:
    - ./peercli
    - --conf
    - ./vol/config.yaml

services:
  slips:
    build:
      context: "."
      dockerfile: Dockerfile
    container_name: myslips
    cap_add:
      - NET_ADMIN
    volumes:
      #- ./slips/config:/StratosphereLinuxIPS/config/
      #- ./logs/:/var/log/
      - C:/Users/timel/MyFolder/MOI_3/Stratosphere/Slips/config:/StratosphereLinuxIPS/config/
      - C:/Users/timel/MyFolder/MOI_3/Stratosphere/Slips/dataset:/StratosphereLinuxIPS/dataset/
      - C:\Users\timel\MyFolder\MOI_3\Stratosphere\Slips\modules\fimos:/StratosphereLinuxIPS/modules/fimos
    ports:
      - "6379:6379"
    networks:
      si_net:
        ipv4_address: 172.168.0.2
    expose:
      - "6379"
  
  iris:
    <<: *default-peer
    volumes:
      - ./iris/dev/peer:/usr/iris/vol
    depends_on:
      - slips
    networks:
      si_net:
        ipv4_address: 172.168.0.10

networks:
  si_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.168.0.0/24
