version: '3.7'
services:
        slips:
                build:
                  context: .
                  dockerfile: Dockerfile
                container_name: SlipsMy
                cap_add:
                  - NET_ADMIN
                volumes:
                  - ./slips/config:/StratosphereLinuxIPS/config/
                  - ./logs/:/var/log/slips
                network_mode: "host"
                entrypoint: ["/bin/bash"]
               